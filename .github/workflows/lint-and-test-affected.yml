name: Lint and Test Affected
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint_and_test_affected:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.x'
          package-manager-cache: false

      - name: Install PNPM
        run: npm install -g pnpm@10.33.0

      - name: Restore PNPM cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store/v10
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps

      # Use Nx Agents for lint and unit tests, then run e2e on the main job.
      - name: Enable Nx Cloud CI
        run: pnpm nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="lint,test,e2e"

      - name: Compute affected SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Run affected linting
        run: pnpm exec nx affected --target=lint --parallel=3

      - name: Run affected unit tests
        run: pnpm exec nx affected --target=test --parallel=3 --coverage --coverageReporters=json --coverageReporters=json-summary

      - name: Run affected e2e tests
        run: pnpm exec nx affected --target=e2e --parallel=1 --outputStyle=static

      - name: Run Nx Self-Healing CI
        run: pnpm exec nx fix-ci
        if: ${{ always() && github.event_name == 'pull_request' }} # Self-healing needs PR context.
